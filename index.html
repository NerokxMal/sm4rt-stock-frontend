<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sm4rt-stock — Gestión de Inventario</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <h1>📦 sm4rt</h1>
      <span>-stock</span>
    </div>
    <nav class="nav">
      <a href="#dashboard" class="nav-link active" data-page="dashboard">
        <span class="icon">📊</span> Dashboard
      </a>
      <a href="#productos" class="nav-link" data-page="productos">
        <span class="icon">📦</span> Productos
      </a>
      <a href="#categorias" class="nav-link" data-page="categorias">
        <span class="icon">🏷️</span> Categorías
      </a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <header class="header">
      <h2 id="page-title">Dashboard</h2>
      <div class="header-actions">
        <button class="btn btn-primary" id="add-btn" style="display:none;">
          ➕ Nuevo
        </button>
      </div>
    </header>

    <!-- CONTENIDO DINÁMICO -->
    <section id="content" class="content">
      <!-- Se llena dinámicamente con JS -->
    </section>
  </main>
</div>

<!-- MODAL PARA CREAR/EDITAR -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2 id="modal-title">Nuevo Producto</h2>
    <form id="form" class="form">
      <!-- Los campos se generan dinámicamente -->
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/productos.js"></script>
<script src="js/categorias.js"></script>
<script src="js/main.js"></script>
</body>
</html>
